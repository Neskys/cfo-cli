name: Release

# Publishes cfo-cli to PyPI when you push a version tag (e.g. `git tag v1.0.0`).
#
# Authentication uses PyPI "Trusted Publishing" (OpenID Connect) — there is NO
# API token or password stored anywhere. Before the first run you must register
# this workflow as a trusted publisher on PyPI (one-time, ~2 minutes):
#
#   1. Create the project owner account at https://pypi.org
#   2. Go to https://pypi.org/manage/account/publishing/ and add a
#      "pending publisher" with:
#         PyPI Project Name : cfo-cli
#         Owner             : Neskys
#         Repository name   : cfo-cli
#         Workflow name     : release.yml
#         Environment name  : pypi
#   3. In this GitHub repo, create an Environment named "pypi"
#      (Settings → Environments). Optionally add required reviewers so a human
#      approves each publish.
#
# After that, releasing is just:
#   - bump `version` in pyproject.toml (and cfo/__init__.py),
#   - commit, then:  git tag v1.0.0 && git push origin v1.0.0
#
# NOTE: a PyPI version is permanent — it cannot be overwritten once published.

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:  # allow a manual run from the Actions tab

permissions:
  contents: read

jobs:
  build:
    name: Build & verify distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: pip install -U build twine

      - name: Run the test suite (release gate)
        run: |
          pip install -e ".[dev,ai,openai]"
          ruff check cfo/ tests/
          pytest tests/ -q

      - name: Verify the tag matches the package version
        if: github.event_name == 'push'
        run: |
          tag="${GITHUB_REF_NAME#v}"
          pkg="$(python -c 'import cfo; print(cfo.__version__)')"
          echo "tag=$tag  package=$pkg"
          if [ "$tag" != "$pkg" ]; then
            echo "::error::Tag v$tag does not match package version $pkg. Bump pyproject.toml/__init__.py first."
            exit 1
          fi

      - name: Build sdist + wheel
        run: python -m build

      - name: Check distribution metadata
        run: twine check dist/*

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment: pypi          # ties the run to the "pypi" environment / trusted publisher
    permissions:
      id-token: write          # required for Trusted Publishing (OIDC) — no token needed
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
